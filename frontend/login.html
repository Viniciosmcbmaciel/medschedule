<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MedSchedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="center-page">

    <div class="auth-container">
        <div class="auth-card">
            <h1>MedSchedule</h1>
            <p class="subtitle">Acesse sua conta</p>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Digite seu email">
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha">
            </div>

            <button class="btn-primary" onclick="login()">Entrar</button>
        </div>

        <div class="auth-card">
            <h2>Criar conta</h2>

            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Digite seu nome">
            </div>

            <div class="form-group">
                <label for="emailCadastro">Email</label>
                <input type="email" id="emailCadastro" placeholder="Digite seu email">
            </div>

            <div class="form-group">
                <label for="senhaCadastro">Senha</label>
                <input type="password" id="senhaCadastro" placeholder="Crie uma senha">
            </div>

            <button class="btn-secondary" onclick="cadastrar()">Cadastrar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
