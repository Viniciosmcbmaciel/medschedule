<!DOCTYPE html>
<html>
<head>
    <title>Agendamento</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 20px;
        }

        h2 {
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }

        .btn-delete {
            background: red;
        }

        .btn-edit {
            background: orange;
        }

        #sistema {
            display: none;
        }
    </style>
</head>

<body>

<div class="box" id="loginBox">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <hr>

    <h3>Criar Conta</h3>

    <input type="text" id="nome" placeholder="Nome">
    <input type="email" id="emailCadastro" placeholder="Email">
    <input type="password" id="senhaCadastro" placeholder="Senha">

    <button onclick="cadastrar()">Cadastrar</button>
</div>

    <!-- 🏥 SISTEMA -->
    <div id="sistema">

        <div class="box">
            <h2>Agendar Consulta</h2>

            <input id="paciente" placeholder="Paciente">
            <input id="medico" placeholder="Médico">
            <input id="data" type="date">
            <input id="horario" type="time">

            <button onclick="agendar()">Agendar</button>
            <button onclick="logout()" style="background:red;">Sair</button>
        </div>

        <div class="box">
            <h2>Consultas</h2>

            <table>
                <thead>
                    <tr>
                        <th>Paciente</th>
                        <th>Médico</th>
                        <th>Data</th>
                        <th>Horário</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista"></tbody>
            </table>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
